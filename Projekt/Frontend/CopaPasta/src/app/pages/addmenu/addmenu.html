<h2>Lagra Menyer</h2>

<form (ngSubmit)="addMenu()">
    <div class="error-message">
        {{ message() }}
    </div>

    <h3>Menyinfo</h3>

    <fieldset class="dish-group">
        <legend>Menydatum</legend>
        <label for="year">År</label>
        <input type="number" id="year" name="year" [(ngModel)]="year">

        <label for="week">Veckonr:</label>
        <input type="number" id="week" name="week" [(ngModel)]="week_number">
    </fieldset>

    <h3>Maträtter</h3>

    @for (dish of dishes; track dish.day_of_week) {

    <fieldset class="dish-group">
        <legend>{{ dish.day_of_week }}</legend>

        <label for="title-{{$index}}">Rättens namn:</label>
        <input type="text" id="title-{{$index}}" name="title-{{$index}}" [(ngModel)]="dish.title"
            placeholder="t.ex. Pasta Alfredo">

        <label for="desc-{{$index}}">Beskrivning:</label>
        <textarea id="desc-{{$index}}" name="desc-{{$index}}" [(ngModel)]="dish.description"
            placeholder="t.ex. ingredienser / Innehåller laktos, gluten"></textarea>

        <label for="price-{{$index}}">Pris (kr):</label>
        <input type="number" id="price-{{$index}}" name="price-{{$index}}" [(ngModel)]="dish.price">
    </fieldset>
    }
    <fieldset class="dish-group weekly-veg">
        <legend>Veckans stående vegetariska</legend>

        <label for="veg-title">Rättens namn:</label>
        <input type="text" id="veg-title" name="veg-title" [(ngModel)]="standingVeg.title"
            placeholder="t.ex. Vegansk Lasagne">

        <label for="veg-desc">Beskrivning:</label>
        <textarea id="veg-desc" name="veg-desc" [(ngModel)]="standingVeg.description"
            placeholder="Ingredienser..."></textarea>

        <label for="veg-price">Pris (kr):</label>
        <input type="number" id="veg-price" name="veg-price" [(ngModel)]="standingVeg.price">
    </fieldset>

    <button type="submit">Lagra meny</button>
</form>
